  # Python: linting (ruff replaces bandit, pyupgrade, refurb)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.5
    hooks:
      - id: ruff-check
        args: [--fix]

  # Python: type checking (uses uv for full dependency visibility)
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy . --install-types --non-interactive
        language: system
        types: [python]
        pass_filenames: false
