  # Vue/Frontend
  - repo: local
    hooks:
      - id: vue-eslint
        name: eslint (vue)
        entry: bash -c 'cd frontend && npm run lint:fix'
        language: system
        pass_filenames: false
        files: '^frontend/.*\.(vue|js|ts|jsx|tsx)$'

      - id: vue-prettier
        name: prettier (vue)
        entry: bash -c 'cd frontend && npx prettier --write'
        language: system
        files: '^frontend/.*\.(vue|js|ts|jsx|tsx|css|scss|json)$'

      - id: vue-stylelint
        name: stylelint (scss)
        entry: bash -c 'cd frontend && npx stylelint --fix'
        language: system
        files: '^frontend/.*\.(vue|css|scss)$'

      - id: vue-typecheck
        name: typecheck (vue)
        entry: bash -c 'cd frontend && npm run typecheck'
        language: system
        pass_filenames: false
        files: '^frontend/.*\.(vue|ts|tsx)$'
