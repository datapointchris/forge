version: 2

builds:
  - main: .
    binary: forge
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/datapointchris/forge/cmd.version={{.Version}}
      - -X github.com/datapointchris/forge/cmd.commit={{.ShortCommit}}
      - -X github.com/datapointchris/forge/cmd.date={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "forge_{{ .Os }}_{{ .Arch }}"

changelog:
  sort: asc
